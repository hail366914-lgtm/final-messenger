<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDK - Чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #1a1a1a; color: #ffffff; height: 100vh; display: flex; flex-direction: column; }
        .chat-header { background: #2d2d2d; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #3d3d3d; }
        .chat-back { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px 10px; text-decoration: none; display: inline-block; }
        .chat-title { font-size: 18px; font-weight: 600; flex: 1; }
        .online-status { font-size: 12px; color: #4ade80; margin-left: 10px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 20px; word-wrap: break-word; position: relative; }
        .message.sent { background-color: #8b5cf6; align-self: flex-end; border-bottom-right-radius: 5px; }
        .message.received { background-color: #3d3d3d; align-self: flex-start; border-bottom-left-radius: 5px; }
        .message-text { font-size: 16px; margin-bottom: 4px; }
        .message-time { font-size: 11px; opacity: 0.7; text-align: right; margin-right: 20px; }
        .message-status { position: absolute; bottom: 5px; right: 10px; font-size: 10px; color: #888; }
        .typing-indicator { padding: 10px 20px; font-size: 12px; color: #888; font-style: italic; }
        .chat-input { background: #2d2d2d; padding: 15px 20px; display: flex; gap: 12px; border-top: 1px solid #3d3d3d; }
        .chat-input input { flex: 1; background: #3d3d3d; border: none; border-radius: 25px; padding: 12px 20px; color: white; outline: none; font-size: 16px; }
        .chat-input input::placeholder { color: #888; }
        .chat-input button { background: #8b5cf6; border: none; border-radius: 25px; padding: 12px 24px; color: white; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        .chat-input button:hover { opacity: 0.8; }
        .connection-status { position: fixed; bottom: 10px; right: 10px; width: 10px; height: 10px; border-radius: 50%; background: #4ade80; }
        .connection-status.disconnected { background: #ef4444; }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="/users" class="chat-back">&lt;</a>
        <div class="chat-title" id="chatTitle"></div>
        <div class="connection-status" id="connStatus"></div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="typing-indicator" id="typingIndicator" style="display: none;"></div>
    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userId = parseInt(localStorage.getItem('userId'));
        const currentUsername = localStorage.getItem('username');
        
        const urlParams = new URLSearchParams(window.location.search);
        const otherUserId = parseInt(urlParams.get('user'));
        const otherUsername = decodeURIComponent(urlParams.get('name'));
        
        if (!token || !userId) {
            window.location.href = '/login';
        }
        
        if (!otherUserId || !otherUsername) {
            window.location.href = '/users';
        }
        
        document.getElementById('chatTitle').innerHTML = `${otherUsername} <span class="online-status" id="onlineStatus">●</span>`;
        
        let ws = null;
        let reconnectAttempts = 0;
        let typingTimeout = null;
        let isTyping = false;
        
        function connectWebSocket() {
            ws = new WebSocket(`ws://localhost:8000/ws/${token}`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                document.getElementById('connStatus').classList.remove('disconnected');
                reconnectAttempts = 0;
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                document.getElementById('connStatus').classList.add('disconnected');
                setTimeout(() => {
                    if (reconnectAttempts < 10) {
                        reconnectAttempts++;
                        connectWebSocket();
                    }
                }, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'new_message':
                    if ((data.sender_id === otherUserId && data.receiver_id === userId) ||
                        (data.sender_id === userId && data.receiver_id === otherUserId)) {
                        addMessageToChat(data, data.sender_id === userId);
                        if (data.sender_id === otherUserId) {
                            sendReadReceipt(data.id, data.sender_id);
                        }
                    }
                    break;
                    
                case 'typing':
                    if (data.sender_id === otherUserId) {
                        if (data.is_typing) {
                            document.getElementById('typingIndicator').style.display = 'block';
                            document.getElementById('typingIndicator').textContent = `${otherUsername} печатает...`;
                            clearTimeout(typingTimeout);
                            typingTimeout = setTimeout(() => {
                                document.getElementById('typingIndicator').style.display = 'none';
                            }, 1500);
                        } else {
                            document.getElementById('typingIndicator').style.display = 'none';
                        }
                    }
                    break;
                    
                case 'status':
                    if (data.user_id === otherUserId) {
                        const statusDot = document.getElementById('onlineStatus');
                        if (data.status === 'online') {
                            statusDot.style.color = '#4ade80';
                            statusDot.title = 'Онлайн';
                        } else {
                            statusDot.style.color = '#888';
                            statusDot.title = 'Оффлайн';
                        }
                    }
                    break;
                    
                case 'pong':
                    console.log('Pong received');
                    break;
            }
        }
        
        async function loadMessages() {
            const resp = await fetch(`/api/messages/${otherUserId}?token=${token}`);
            if (resp.status === 401) {
                localStorage.clear();
                window.location.href = '/login';
                return;
            }
            const messages = await resp.json();
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            for (const msg of messages) {
                const isSent = msg.sender_id === userId;
                addMessageToChat(msg, isSent);
            }
            container.scrollTop = container.scrollHeight;
        }
        
        function addMessageToChat(msg, isSent) {
            const container = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.id = `msg-${msg.id}`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            messageDiv.innerHTML = `
                <div class="message-text">${escapeHtml(msg.content)}</div>
                <div class="message-time">${time}</div>
                ${isSent ? '<div class="message-status" id="status-' + msg.id + '">✓</div>' : ''}
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function updateMessageStatus(messageId, status) {
            const statusEl = document.getElementById(`status-${messageId}`);
            if (statusEl) {
                if (status === 'read') {
                    statusEl.innerHTML = '✓✓';
                    statusEl.style.color = '#4ade80';
                } else if (status === 'delivered') {
                    statusEl.innerHTML = '✓✓';
                    statusEl.style.color = '#888';
                } else if (status === 'sent') {
                    statusEl.innerHTML = '✓';
                }
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            const tempId = 'temp_' + Date.now();
            const tempMessage = {
                id: tempId,
                sender_id: userId,
                receiver_id: otherUserId,
                content: content,
                timestamp: new Date().toISOString()
            };
            addMessageToChat(tempMessage, true);
            
            input.value = '';
            sendTypingStop();
            
            try {
                const resp = await fetch(`/api/messages?token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ receiver_id: otherUserId, content: content })
                });
                
                if (resp.ok) {
                    const realMessage = await resp.json();
                    const tempMsgDiv = document.getElementById(`msg-${tempId}`);
                    if (tempMsgDiv) {
                        tempMsgDiv.id = `msg-${realMessage.id}`;
                        const statusSpan = tempMsgDiv.querySelector('.message-status');
                        if (statusSpan) {
                            statusSpan.id = `status-${realMessage.id}`;
                        }
                        updateMessageStatus(realMessage.id, 'sent');
                    }
                } else {
                    const error = await resp.json();
                    alert('Ошибка отправки: ' + JSON.stringify(error));
                    const tempMsgDiv = document.getElementById(`msg-${tempId}`);
                    if (tempMsgDiv) {
                        tempMsgDiv.style.backgroundColor = '#ff4444';
                    }
                }
            } catch(e) {
                console.error('Send error:', e);
                alert('Ошибка отправки сообщения');
            }
        }
        
        function sendReadReceipt(messageId, senderId) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'read_receipt',
                    message_id: messageId,
                    sender_id: senderId
                }));
                updateMessageStatus(messageId, 'read');
            }
        }
        
        function sendTypingStart() {
            if (ws && ws.readyState === WebSocket.OPEN && !isTyping) {
                isTyping = true;
                ws.send(JSON.stringify({
                    type: 'typing',
                    receiver_id: otherUserId,
                    is_typing: true
                }));
            }
        }
        
        function sendTypingStop() {
            if (ws && ws.readyState === WebSocket.OPEN && isTyping) {
                isTyping = false;
                ws.send(JSON.stringify({
                    type: 'typing',
                    receiver_id: otherUserId,
                    is_typing: false
                }));
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
                sendTypingStop();
            } else {
                sendTypingStart();
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    sendTypingStop();
                }, 1000);
            }
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function ping() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }
        
        connectWebSocket();
        loadMessages();
        setInterval(ping, 30000);
    </script>
</body>
</html>
